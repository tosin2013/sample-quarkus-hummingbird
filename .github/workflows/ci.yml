name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    # Run every Monday at 9:00 AM UTC
    - cron: '0 9 * * 1'
  workflow_dispatch:

jobs:
  maven-build:
    name: Maven Build and Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        run: ./mvnw clean package -DskipTests

      - name: Run tests
        continue-on-error: true
        run: ./mvnw test

      - name: Verify quarkus-run.jar exists
        run: |
          if [ -f target/quarkus-app/quarkus-run.jar ]; then
            echo "✅ quarkus-run.jar successfully created"
            ls -lh target/quarkus-app/quarkus-run.jar
          else
            echo "❌ quarkus-run.jar not found"
            exit 1
          fi

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: quarkus-app
          path: target/quarkus-app/
          retention-days: 7

  container-build:
    name: Container Build Validation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Buildah
        run: |
          sudo apt-get update
          sudo apt-get install -y buildah

      - name: Build container image with Buildah
        run: |
          buildah bud -t sample-quarkus-hummingbird:latest .

      - name: Inspect image
        run: |
          buildah images
          IMAGE_ID=$(buildah images -q sample-quarkus-hummingbird:latest | head -n1)
          echo "Image ID: $IMAGE_ID"

          # Get image configuration
          buildah inspect --type=image $IMAGE_ID > image-config.json

          # Verify non-root user (UID 65532)
          USER_ID=$(cat image-config.json | jq -r '.OCIv1.config.User // .Docker.config.User // "0"')
          echo "Container runs as UID: $USER_ID"

          if [ "$USER_ID" = "65532" ]; then
            echo "✅ Image correctly configured with non-root user (UID 65532)"
          else
            echo "⚠️  Warning: Image user is $USER_ID, expected 65532"
          fi

          # Verify exposed port
          EXPOSED_PORT=$(cat image-config.json | jq -r '.OCIv1.config.ExposedPorts // .Docker.config.ExposedPorts | keys[]' 2>/dev/null | grep 8080 || echo "")
          if [ -n "$EXPOSED_PORT" ]; then
            echo "✅ Port 8080 is exposed"
          else
            echo "⚠️  Warning: Port 8080 not found in exposed ports"
          fi

      - name: Upload image config
        uses: actions/upload-artifact@v4
        with:
          name: image-config
          path: image-config.json
          retention-days: 7

  security-scan:
    name: Security Scanning
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build container image for scanning
        run: |
          docker build -t sample-quarkus-hummingbird:scan .

      - name: Install Syft
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh | sh -s -- -b /usr/local/bin
          syft version

      - name: Generate SBOM with Syft
        run: |
          syft sample-quarkus-hummingbird:scan -o spdx-json=sbom.spdx.json
          syft sample-quarkus-hummingbird:scan -o json=sbom.json
          echo "✅ SBOM generated successfully"
          echo "SBOM size: $(wc -c < sbom.spdx.json) bytes"

      - name: Install Grype
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/grype/main/install.sh | sh -s -- -b /usr/local/bin
          grype version

      - name: Scan with Grype
        continue-on-error: true
        run: |
          grype sample-quarkus-hummingbird:scan --output table --output json --file grype-report.json

          # Count vulnerabilities by severity
          CRITICAL=$(cat grype-report.json | jq '[.matches[] | select(.vulnerability.severity == "Critical")] | length')
          HIGH=$(cat grype-report.json | jq '[.matches[] | select(.vulnerability.severity == "High")] | length')
          MEDIUM=$(cat grype-report.json | jq '[.matches[] | select(.vulnerability.severity == "Medium")] | length')
          LOW=$(cat grype-report.json | jq '[.matches[] | select(.vulnerability.severity == "Low")] | length')

          echo "📊 Vulnerability Summary:"
          echo "  Critical: $CRITICAL"
          echo "  High: $HIGH"
          echo "  Medium: $MEDIUM"
          echo "  Low: $LOW"

          if [ "$CRITICAL" -eq 0 ] && [ "$HIGH" -eq 0 ]; then
            echo "✅ No critical or high vulnerabilities found!"
          else
            echo "⚠️  Found $CRITICAL critical and $HIGH high severity vulnerabilities"
          fi

      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: |
            sbom.spdx.json
            sbom.json
          retention-days: 30

      - name: Upload Grype report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: grype-report
          path: grype-report.json
          retention-days: 30

  dependency-check:
    name: Dependency Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Check for outdated dependencies
        continue-on-error: true
        run: |
          echo "📦 Checking for outdated Maven dependencies..."
          ./mvnw versions:display-dependency-updates

      - name: Check for plugin updates
        continue-on-error: true
        run: |
          echo "🔌 Checking for Maven plugin updates..."
          ./mvnw versions:display-plugin-updates
